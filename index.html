<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Агент Землі | Таємниці планети</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #ffb347;
            --dark-blue: #1f4e6e;
            --bg-light: #fff8e1;
            --accent-green: #70b85e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: linear-gradient(145deg, #b5d8ff 0%, #2c6e9e 100%);
            font-family: 'Quicksand', sans-serif;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-wrapper {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 248, 225, 0.98);
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 3px solid var(--primary);
            position: relative;
        }

        /* Адаптація під маленькі екрани */
        @media (max-height: 700px) {
            .game-header { padding: 10px !important; }
            .game-title { font-size: 1.2rem !important; }
            .worm-mascot { transform: scale(0.8); margin-bottom: 5px !important; }
            .mission-card { padding: 10px !important; }
            .mission-card div:first-child { font-size: 1.5rem !important; }
        }

        .game-header {
            background: var(--dark-blue);
            padding: 20px;
            text-align: center;
            color: #fff2b5;
            border-bottom: 5px solid var(--primary);
        }

        .worm-mascot {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            border-radius: 100px;
            padding: 5px 15px;
            width: fit-content;
            margin: 0 auto 10px;
            box-shadow: 0 4px 0 #b97f2e;
        }

        .game-title { font-size: 1.6rem; font-weight: 800; text-shadow: 2px 2px 0 #0e3a52; }

        .progress-fun {
            display: flex;
            background: #f3d382;
            padding: 8px;
            justify-content: space-around;
            margin: 10px;
            border-radius: 30px;
        }

        .step-badge {
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 20px;
            background: #fef1cf;
            font-weight: bold;
            opacity: 0.6;
        }

        .step-badge.active { opacity: 1; background: var(--primary); color: white; }

        .screen { display: none; padding: 15px; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .candy-btn {
            background: linear-gradient(135deg, #ffb347, #ff8c1a);
            border: none;
            color: white;
            font-weight: 800;
            padding: 15px;
            border-radius: 30px;
            font-size: 1.1rem;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 5px 0 #a65311;
            margin-top: 10px;
            transition: all 0.1s;
        }

        .candy-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #a65311; }

        .missions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }

        .mission-card {
            background: #fff3df;
            border-radius: 25px;
            padding: 15px;
            text-align: center;
            border: 2px solid #f0bc6e;
            box-shadow: 0 4px 0 #cf9f4a;
        }

        .mission-card.completed { background: #cbe5b4; border-color: #6f9e3f; box-shadow: 0 4px 0 #4e7a26; }

        .code-display {
            background: #2e241f;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 8px;
            color: #ffd966;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            text-align: center;
            font-size: 1.1rem;
            margin: 10px 0;
            font-family: inherit;
        }

        .certificate {
            background: #fef9e6;
            border: 6px double var(--primary);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stamp-icon {
            position: absolute;
            right: 10px;
            bottom: 10px;
            opacity: 0.1;
            transform: rotate(-20deg);
            font-size: 4rem;
            color: var(--dark-blue);
        }
    </style>
</head>
<body oncontextmenu="return false;">

<div class="game-wrapper">
    <div class="game-header">
        <div class="worm-mascot">
            <i class="fas fa-globe"></i>
            <span>Геолог Грунтик</span>
        </div>
        <div class="game-title">АГЕНТ ЗЕМЛІ</div>
    </div>

    <div class="progress-fun">
        <div class="step-badge active" id="badge1">ID</div>
        <div class="step-badge" id="badge2">МІСІЇ</div>
        <div class="step-badge" id="badge3">КОД</div>
        <div class="step-badge" id="badge4">КУБОК</div>
    </div>

    <div id="screen1" class="screen active">
        <p style="text-align:center; margin-bottom:10px; font-weight:600;">Вітаємо в експедиції!</p>
        <input type="text" id="playerName" placeholder="Назва команди або ім'я..." maxlength="15">
        <button class="candy-btn" id="startBtn">РОЗПОЧАТИ (5 хв)</button>
        <p style="text-align:center; font-size:0.8rem; margin-top:10px; color:#666;">Місія завершиться через 300 секунд</p>
    </div>

    <div id="screen2" class="screen">
        <div style="display:flex; justify-content: space-between; font-weight:bold; margin-bottom:10px;">
            <span>⭐ Бали: <span id="score">0</span></span>
            <span id="timer" style="color:red; background:#ffebeb; padding:2px 8px; border-radius:10px;">05:00</span>
        </div>
        <div class="code-display" id="codeView">_____</div>
        <div class="missions-grid" id="missionsGrid"></div>
        <button id="toDecoder" class="candy-btn" style="display:none; background: var(--accent-green); box-shadow: 0 5px 0 #3e6b2f;">🔓 ВІДКРИТИ ДЕШИФРАТОР</button>
    </div>

    <div id="screen3" class="screen">
        <div class="certificate">
            <h3>ВВЕДИ СЕКРЕТНЕ СЛОВО</h3>
            <p style="font-size:0.8rem; margin:10px 0;">Використай зібрані літери!</p>
            <input type="text" id="finalWordInput" placeholder="??????" style="font-size:1.5rem; letter-spacing:5px;">
            <button class="candy-btn" id="checkFinalBtn">ПЕРЕВІРИТИ КОД</button>
        </div>
    </div>

    <div id="screen4" class="screen">
        <div class="certificate" id="certBox">
            <div class="stamp-icon"><i class="fas fa-stamp"></i></div>
            
            <i class="fas fa-award" style="font-size: 3rem; color:var(--primary);"></i>
            <h2 style="margin:10px 0; color: var(--dark-blue); font-size: 1.4rem;">СЕРТИФІКАТ АГЕНТА</h2>
            
            <div style="margin: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 10px 0;">
                <p style="font-size: 0.8rem;">Цей документ підтверджує, що</p>
                <p style="font-size: 1.2rem; color: #a65311; font-weight: 800; margin: 5px 0;" id="outName"></p>
                <p style="font-size: 0.8rem;">став(ла) кращим дослідником надр!</p>
            </div>

            <div style="display: flex; justify-content: space-between; text-align: left; font-size: 0.7rem; color: #666; margin-top: 10px;">
                <div>
                    <div>📅 Дата: <span id="certDate" style="font-weight:600;"></span></div>
                    <div>⏰ Час: <span id="certTime" style="font-weight:600;"></span></div>
                </div>
                <div style="text-align: right;">
                    <div id="certID" style="font-family:monospace;"></div>
                    <div style="font-style:italic;">Місія: Надра Землі</div>
                </div>
            </div>
        </div>
        <button class="candy-btn" id="saveCert" style="background:#4a90e2; box-shadow:0 5px 0 #2a6dbd;">📸 ЗБЕРЕГТИ СЕРТИФІКАТ</button>
        <button class="candy-btn" onclick="location.reload()" style="background:#999; box-shadow:0 5px 0 #666;">🏁 ЗАВЕРШИТИ УРОК</button>
    </div>
</div>

<div id="missionModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; padding:20px; align-items:center; justify-content:center;">
    <div style="background:white; padding:20px; border-radius:30px; max-width:400px; width:100%; position:relative;">
        <h3 id="mTitle" style="color:var(--dark-blue);"></h3>
        <p id="mTheory" style="font-size:0.95rem; margin:15px 0; line-height:1.4; background:#fdf8e6; padding:15px; border-radius:15px; border-left:4px solid var(--primary);"></p>
        <div id="mOptions"></div>
        <button onclick="closeModal()" style="margin-top:15px; background:none; border:none; color:#bbb; width:100%; font-weight:bold;">ЗАКРИТИ</button>
    </div>
</div>

<script>
    const missions = [
        { t: "Земна кора", i: "🗻", q: "Яка товщина материкової кори?", o: ["5-10 км", "30-70 км", "100+ км"], c: 1, l: "З" },
        { t: "Мантія", i: "🔥", q: "Де знаходиться астеносфера?", o: ["В ядрі", "В мантії", "В космосі"], c: 1, l: "Е" },
        { t: "Ядро", i: "⚙️", q: "Який стан зовнішнього ядра?", o: ["Твердий", "Рідкий", "Газовий"], c: 1, l: "М" },
        { t: "Плити", i: "🧩", q: "Чому рухаються літосферні плити?", o: ["Через вітер", "Через астеносферу", "Вони не рухаються"], c: 1, l: "Л" },
        { t: "Свердловини", i: "🕳️", q: "Найглибша свердловина світу?", o: ["Маріанська", "Кольська", "Одеська"], c: 1, l: "Я" }
    ];

    let state = {
        name: "",
        score: 0,
        completed: [false, false, false, false, false],
        letters: ["_", "_", "_", "_", "_"],
        timeLeft: 300,
        timerActive: false
    };

    // Оптимізація батареї
    document.addEventListener("visibilitychange", () => {
        if(state.timerActive) state.timerActive = !document.hidden;
    });

    function showScreen(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('screen' + n).classList.add('active');
        document.querySelectorAll('.step-badge').forEach((b, i) => {
            b.classList.toggle('active', i + 1 === n);
        });
    }

    document.getElementById('startBtn').onclick = () => {
        const val = document.getElementById('playerName').value.trim();
        if(val.length < 2) return alert("Будь ласка, введи ім'я!");
        state.name = val;
        startTimer();
        renderMissions();
        showScreen(2);
    };

    function startTimer() {
        state.timerActive = true;
        const interval = setInterval(() => {
            if(!state.timerActive && state.timeLeft > 0) return;
            if(state.timeLeft <= 0) {
                clearInterval(interval);
                alert("Час вийшов! Спробуй швидше.");
                location.reload();
                return;
            }
            state.timeLeft--;
            let m = Math.floor(state.timeLeft / 60);
            let s = state.timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function renderMissions() {
        const grid = document.getElementById('missionsGrid');
        grid.innerHTML = '';
        missions.forEach((m, idx) => {
            const card = document.createElement('div');
            card.className = `mission-card ${state.completed[idx] ? 'completed' : ''}`;
            card.innerHTML = `<div style="font-size:2rem">${m.i}</div><div style="font-size:0.8rem; font-weight:800">${m.t}</div>`;
            card.onclick = () => !state.completed[idx] && openMission(idx);
            grid.appendChild(card);
        });
        document.getElementById('codeView').innerText = state.letters.join('');
        if(state.completed.every(v => v)) document.getElementById('toDecoder').style.display = 'block';
    }

    function openMission(idx) {
        const m = missions[idx];
        document.getElementById('mTitle').innerText = m.t;
        document.getElementById('mTheory').innerText = m.q;
        const opts = document.getElementById('mOptions');
        opts.innerHTML = '';
        m.o.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'candy-btn';
            btn.style.fontSize = '0.95rem';
            btn.innerText = o;
            btn.onclick = () => {
                if(i === m.c) {
                    state.completed[idx] = true;
                    state.letters[idx] = m.l;
                    state.score += 20;
                    document.getElementById('score').innerText = state.score;
                    closeModal();
                    renderMissions();
                    canvasConfetti({ particleCount: 40, spread: 50, origin: { y: 0.8 } });
                } else {
                    btn.style.background = 'linear-gradient(135deg, #ff4d4d, #b30000)';
                    btn.style.boxShadow = '0 5px 0 #660000';
                    setTimeout(() => { btn.style.background = ''; btn.style.boxShadow = ''; }, 500);
                }
            };
            opts.appendChild(btn);
        });
        document.getElementById('missionModal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('missionModal').style.display = 'none'; }

    document.getElementById('toDecoder').onclick = () => showScreen(3);

    document.getElementById('checkFinalBtn').onclick = () => {
        let val = document.getElementById('finalWordInput').value.trim().toUpperCase()
            .replace(/E/g, 'Е').replace(/M/g, 'М').replace(/A/g, 'А');
            
        if(val === "ЗЕМЛЯ") {
            state.timerActive = false;
            
            // Дата та Час
            const now = new Date();
            document.getElementById('outName').innerText = state.name.toUpperCase();
            document.getElementById('certDate').innerText = now.toLocaleDateString('uk-UA');
            document.getElementById('certTime').innerText = now.toLocaleTimeString('uk-UA', {hour: '2-digit', minute:'2-digit'});
            document.getElementById('certID').innerText = 'ID: ' + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            showScreen(4);
            canvasConfetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        } else {
            alert("Слово невірне! Підказка: На чому ми живемо?");
        }
    };

    document.getElementById('saveCert').onclick = () => {
        const btn = document.getElementById('saveCert');
        btn.innerText = "ГЕНЕРУЄМ...";
        html2canvas(document.getElementById('certBox'), {
            scale: 3,
            backgroundColor: "#fef9e6",
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Sertyfikat_${state.name}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
            btn.innerText = "📸 ЗБЕРЕГТИ СЕРТИФІКАТ";
        });
    };
</script>
</body>
</html>
